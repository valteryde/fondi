# Build and upload fondi to PyPI on every push to master.
# The base version in pyproject.toml is suffixed with .dev<run_number> so each
# push produces a unique release (PyPI rejects duplicate version numbers).

name: Upload Python Package

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set dev version
        run: |
          BASE=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/' | sed 's/\.dev.*//')
          VERSION="${BASE}.dev${{ github.run_number }}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" pyproject.toml
          echo "Publishing version ${VERSION}"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
