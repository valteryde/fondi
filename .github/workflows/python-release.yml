# Build and upload fondi to PyPI when a GitHub release is published.
# Bump version in pyproject.toml before creating the release; the release tag
# must match that version (with or without a leading "v").

name: Release Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify release tag matches pyproject.toml
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$TAG" != "$VERSION" ]; then
            echo "Release tag ${TAG} does not match pyproject.toml version ${VERSION}"
            exit 1
          fi
          echo "Publishing version ${VERSION}"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
